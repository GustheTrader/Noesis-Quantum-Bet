# Copy Bot — Default Configuration

phases:
  pre_game:
    gates:
      - liquidity_gate
      - volume_gate
      - spread_gate
    filters:
      - noise_filter
      - confidence_filter
    agents:
      - sports_sme
      - politics_sme
    max_exposure: 10000.0

  in_play:
    gates:
      - liquidity_gate
      - volatility_gate
    filters:
      - noise_filter
      - momentum_filter
    agents:
      - sports_sme
    max_exposure: 5000.0

cron:
  # Phase transitions — set per event
  pre_game_to_in_play: "0 */1 * * *"  # placeholder
  in_play_to_closed: "30 */1 * * *"    # placeholder

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  # credentials loaded from env: KALSHI_API_KEY, KALSHI_API_SECRET

polymarket:
  # data feed config
  websocket_url: "wss://ws-subscriptions-clob.polymarket.com"
